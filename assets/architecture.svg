<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f6fb"/>
    </linearGradient>
    <linearGradient id="client" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#e7ecfe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e293b" flood-opacity="0.10"/>
    </filter>
    <marker id="orange" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#ef5719"/>
    </marker>
    <marker id="teal" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#0d9488"/>
    </marker>
    <marker id="indigo" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#6366f1"/>
    </marker>
  </defs>

  <rect x="2" y="2" width="956" height="496" rx="24" fill="url(#page)" stroke="#e5e9f2"/>

  <!-- heading -->
  <text x="44" y="52" font-size="23" font-weight="700" fill="#0f172a">One socket, many targets</text>
  <text x="44" y="78" font-size="14" fill="#64748b">A single <tspan font-weight="600" fill="#475569">Client</tspan> fans out to every host and routes each reply back to the right <tspan font-weight="600" fill="#475569">Pinger</tspan>.</text>

  <!-- client container -->
  <rect x="404" y="120" width="500" height="256" rx="20" fill="url(#client)" stroke="#c7d2fe"/>
  <text x="428" y="150" font-size="12" font-weight="700" letter-spacing="1.5" fill="#6366f1">CLIENT · CHEAP TO CLONE</text>

  <!-- socket node -->
  <rect x="440" y="164" width="428" height="78" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="466" y="199" font-size="17" font-weight="700" fill="#0f172a">one system socket</text>
  <text x="466" y="221" font-size="13" fill="#64748b">a single shared file descriptor</text>

  <!-- recv node -->
  <rect x="440" y="272" width="428" height="82" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="466" y="307" font-size="17" font-weight="700" fill="#0f172a">recv task + ReplyMap</text>
  <text x="466" y="329" font-size="13" fill="#64748b">reads every reply once, dispatches by key</text>

  <!-- pinger cards -->
  <g>
    <rect x="44" y="140" width="200" height="62" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <text x="66" y="170" font-size="15" font-weight="700" fill="#0f172a">Pinger</text>
    <text x="66" y="190" font-size="13" fill="#475569" font-family="ui-monospace, 'SF Mono', Menlo, monospace">8.8.8.8</text>
  </g>
  <g>
    <rect x="44" y="222" width="200" height="62" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <text x="66" y="252" font-size="15" font-weight="700" fill="#0f172a">Pinger</text>
    <text x="66" y="272" font-size="13" fill="#475569" font-family="ui-monospace, 'SF Mono', Menlo, monospace">1.1.1.1</text>
  </g>
  <g>
    <rect x="44" y="304" width="200" height="62" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
    <text x="66" y="334" font-size="15" font-weight="700" fill="#0f172a">Pinger</text>
    <text x="66" y="354" font-size="13" fill="#475569" font-family="ui-monospace, 'SF Mono', Menlo, monospace">2606:4700::1111</text>
  </g>

  <!-- request arrows (pinger -> socket) -->
  <g fill="none" stroke="#ef5719" stroke-width="2.2" marker-end="url(#orange)">
    <path d="M244,171 C 330,171 360,185 438,190"/>
    <path d="M244,253 C 340,253 360,205 438,201"/>
    <path d="M244,335 C 360,335 370,216 438,212"/>
  </g>
  <text x="300" y="128" font-size="13" font-weight="600" fill="#ef5719">echo request</text>

  <!-- reply flows socket -> recv -->
  <path d="M654,242 L654,272" fill="none" stroke="#0d9488" stroke-width="2.4" marker-end="url(#teal)"/>
  <text x="668" y="262" font-size="13" font-weight="600" fill="#0d9488">reply</text>

  <!-- route back (recv -> pingers) dashed left bus -->
  <g fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="6 5">
    <path d="M440,322 C 372,322 372,452 300,452 L 30,452 L 30,171"/>
    <path d="M30,171 L42,171" marker-end="url(#indigo)"/>
    <path d="M30,253 L42,253" marker-end="url(#indigo)"/>
    <path d="M30,335 L42,335" marker-end="url(#indigo)"/>
  </g>
  <text x="330" y="478" font-size="13" font-weight="600" fill="#6366f1">routed back by (address · identifier · sequence)</text>
</svg>
